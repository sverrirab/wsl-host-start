name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-go@v5
        with:
          go-version: "1.24"
      - uses: goreleaser/goreleaser-action@v6
        with:
          version: "~> v2"
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAP_GITHUB_TOKEN: ${{ secrets.TAP_GITHUB_TOKEN }}

      # Create a combined zip with both binaries for manual install.
      - name: Create combined bundle
        run: |
          VERSION=${GITHUB_REF_NAME#v}
          mkdir -p bundle
          # Extract both platform zips into one directory.
          unzip -o dist/wstart_${VERSION}_linux_amd64.zip -d bundle/
          unzip -o dist/wstart_${VERSION}_windows_amd64.zip -d bundle/
          cd bundle && zip ../dist/wstart_${VERSION}_bundle.zip *
      - name: Upload combined bundle to release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSION=${GITHUB_REF_NAME#v}
          gh release upload ${GITHUB_REF_NAME} dist/wstart_${VERSION}_bundle.zip --clobber
