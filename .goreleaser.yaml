version: 2

builds:
  - id: wstart
    main: ./cmd/wstart
    binary: wstart
    goos: [linux]
    goarch: [amd64, arm64]
    ldflags:
      - -s -w -X main.version={{.Version}}

  - id: wstart-host
    main: ./cmd/wstart-host
    binary: wstart-host
    goos: [windows]
    goarch: [amd64, arm64]
    ldflags:
      - -s -w -X main.version={{.Version}}

archives:
  - id: release
    builds: [wstart, wstart-host]
    formats: [zip]
    name_template: "wstart_{{.Version}}_windows_{{ .Arch }}"
    # Bundle both binaries together — user extracts and runs wstart-host.exe --install.
    wrap_in_directory: false

scoops:
  - repository:
      owner: sverrirab
      name: scoop-bucket
      token: "{{ .Env.TAP_GITHUB_TOKEN }}"
    homepage: https://github.com/sverrirab/wsl-host-start
    description: Launch Windows programs from WSL with path translation
    license: MIT
    post_install: ["Write-Host ''; Write-Host 'Run: wstart-host.exe --install' -ForegroundColor Cyan; Write-Host 'This copies binaries to Program Files (requires admin) and prints WSL setup instructions.' "]

checksum:
  name_template: "checksums.txt"

changelog:
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"
