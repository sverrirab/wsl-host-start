version: 2

builds:
  - id: wstart
    main: ./cmd/wstart
    binary: wstart
    goos: [linux]
    goarch: [amd64, arm64]
    ldflags:
      - -s -w -X main.version={{.Version}}

  - id: wstart-host
    main: ./cmd/wstart-host
    binary: wstart-host
    goos: [windows]
    goarch: [amd64, arm64]
    ldflags:
      - -s -w -X main.version={{.Version}}

archives:
  - id: release
    builds: [wstart, wstart-host]
    format: zip
    name_template: "wstart_{{.Version}}_windows_{{ .Arch }}"
    # Bundle both binaries together — user extracts and runs wstart-host.exe --install.
    wrap_in_directory: false

checksum:
  name_template: "checksums.txt"

changelog:
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"
