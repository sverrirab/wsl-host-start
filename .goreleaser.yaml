version: 2

builds:
  - id: wstart
    main: ./cmd/wstart
    binary: wstart
    goos: [linux]
    goarch: [amd64]
    ldflags:
      - -s -w -X main.version={{.Version}}

  - id: wstart-host
    main: ./cmd/wstart-host
    binary: wstart-host
    goos: [windows]
    goarch: [amd64]
    ldflags:
      - -s -w -X main.version={{.Version}}

archives:
  - id: wstart-linux
    builds: [wstart]
    formats: [zip]
    name_template: "wstart_{{.Version}}_linux_amd64"
    wrap_in_directory: false
  - id: wstart-windows
    builds: [wstart-host]
    formats: [zip]
    name_template: "wstart_{{.Version}}_windows_amd64"
    wrap_in_directory: false

scoops:
  - ids: [wstart-windows]
    repository:
      owner: sverrirab
      name: scoop-bucket
      token: "{{ .Env.TAP_GITHUB_TOKEN }}"
    homepage: https://github.com/sverrirab/wsl-host-start
    description: Launch Windows programs from WSL with path translation
    license: MIT
    post_install: ["Write-Host ''; Write-Host 'Run: wstart-host.exe --install' -ForegroundColor Cyan; Write-Host 'This copies binaries to Program Files (requires admin). Your existing config files are preserved.' "]

checksum:
  name_template: "checksums.txt"

changelog:
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"
